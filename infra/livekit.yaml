# LiveKit server config — LOCAL DEV ONLY.
# When hosting online: set rtc.use_external_ip true, add a TURN block with TLS,
# rotate keys out of source control, and point redis.address at the cache.
port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
  # LAN demo: advertise the host's hotspot IP so the other laptop reaches media over UDP.
  node_ip: 192.168.1.2

# Single-node dev can run without redis, but we wire it now for the online/scale path.
redis:
  address: redis:6379

# Dev API key:secret. Backend signs join tokens with these (see apps/api .env).
# Secret must be >= 32 chars. DO NOT reuse in production.
keys:
  devkey: devsecretdevsecretdevsecretdevsecret

logging:
  level: info
  json: false
