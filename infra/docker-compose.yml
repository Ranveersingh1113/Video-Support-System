name: vsp

services:
  livekit:
    image: livekit/livekit-server:v1.8
    profiles: ["docker-livekit"]
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"           # signaling + server API (WebSocket/HTTP)
      - "7881:7881"           # RTC over TCP (ICE/TURN-TCP fallback)
      - "50000-50100:50000-50100/udp"  # RTC media (UDP)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    ports:
      - "7981:7981"
      - "7982:7982"
    volumes:
      - ./livekit-egress/egress.yaml:/etc/egress.yaml:ro
      - ../recordings:/out/recordings
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vsp
      POSTGRES_PASSWORD: vsp_dev_pw
      POSTGRES_DB: vsp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsp -d vsp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
