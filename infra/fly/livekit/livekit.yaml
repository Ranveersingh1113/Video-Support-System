# LiveKit config for Fly.io deploy. NO keys here — injected via LIVEKIT_KEYS secret.
# Media is forced onto TCP 7881 (reliable behind Fly's proxy); a single muxed UDP
# port is advertised best-effort but TCP is the guaranteed path.
port: 7880

rtc:
  # ICE/TCP on port 80 — a universally-open outbound port (mobile/corp networks
  # block odd ports like 7881). No TLS needed for ICE-TCP framing.
  tcp_port: 80
  udp_port: 50000
  use_external_ip: false
  # Pin ICE candidates to the Fly dedicated IPv4 so remote peers can reach us.
  node_ip: 149.248.212.248

logging:
  level: info
  json: false
