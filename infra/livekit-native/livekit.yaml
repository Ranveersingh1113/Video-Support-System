# Native LiveKit for the LAN demo — runs directly on the host (NOT Docker) so it
# owns the UDP socket on 192.168.1.2 and WebRTC media flows both ways cleanly.
# Single muxed UDP port 50000 (inside the firewall range already allowed).
port: 7880

rtc:
  tcp_port: 7881
  udp_port: 50000
  use_external_ip: false
  node_ip: 192.168.1.2

keys:
  devkey: devsecretdevsecretdevsecretdevsecret

redis:
  address: 127.0.0.1:6379

# Authoritative session history: LiveKit signs these and posts join/leave/room events.
webhook:
  api_key: devkey
  urls:
    - http://localhost:4000/api/webhooks/livekit

logging:
  level: info
  json: false
