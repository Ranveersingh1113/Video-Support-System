name: vsp-prod

# Full production stack:
#   caddy      — auto-HTTPS reverse proxy (port 80/443)
#   app        — Fastify API + built React web (port 4000 internal)
#   livekit    — SFU signalling (port 7880 internal; UDP 50000-50100 direct)
#   egress     — LiveKit recording worker
#   postgres   — primary database
#   redis      — LiveKit room state + egress coordination
#
# Before first run:
#   cp .env.production.example .env.production
#   cp infra/livekit-prod.yaml.example infra/livekit-prod.yaml
#   cp infra/livekit-egress/egress.prod.yaml.example infra/livekit-egress/egress.prod.yaml
#   # fill in real values in all three files
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"       # HTTP/3
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host-networked livekit
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""           # empty = same origin (served by caddy → app)
        VITE_LIVEKIT_URL: ${VITE_LIVEKIT_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_PUBLIC_URL: ${VITE_LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL}
      INVITE_TTL_MINUTES: ${INVITE_TTL_MINUTES:-120}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
      BODY_LIMIT_BYTES: ${BODY_LIMIT_BYTES:-8388608}
      EGRESS_RECORDING_DIR: /app/recordings
      RECORDING_DIR: /app/recordings
      UPLOAD_DIR: /app/uploads
      PORT: 4000
    volumes:
      - ./recordings:/app/recordings
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host-networked livekit
    depends_on:
      postgres:
        condition: service_healthy

  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    # Host networking: LiveKit binds 7880/7881 + the UDP media range directly on the
    # host, bypassing Docker's userland UDP proxy. The proxy mangles WebRTC's address
    # tuple and breaks media after the ICE handshake (reconnect loop). With host net
    # there are no docker-proxy processes for the 101 media ports. Ports come from
    # livekit-prod.yaml; the OS firewall must allow them (already configured).
    network_mode: host
    volumes:
      - ./infra/livekit-prod.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host-networked livekit
    volumes:
      - ./infra/livekit-egress/egress.prod.yaml:/etc/egress.yaml:ro
      - ./recordings:/app/recordings
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vsp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vsp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vsp} -d ${POSTGRES_DB:-vsp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Published on loopback so the host-networked livekit can reach it at 127.0.0.1:6379.
    # Bridge services (egress) still reach it via the "redis" service name.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
